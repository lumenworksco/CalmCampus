<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="shared.css"></head>
<body>
<div class="screen">
  <div class="screen-scroll">
  <div class="profile-header">
    <div class="profile-title">Profile</div>
    <div class="gear-btn">⚙️</div>
  </div>

  <div class="avatar-card">
    <div class="avatar"><img src="avatar.jpg" alt="Hélène David"></div>
    <div>
      <div class="avatar-name">Hélène David</div>
      <div class="avatar-since">Member since April 2026</div>
    </div>
    <div style="margin-left:auto;color:rgba(0,0,0,0.3);font-size:14px;display:inline-block;transform:scaleX(-1)">✏️</div>
  </div>

  <div class="section-label">Stats</div>

  <div class="signals-card">
    <div class="stat-row">
      <div class="stat-icon" style="background:rgba(255,159,10,0.12)">🔥</div>
      <div class="stat-label">Current streak</div>
      <div class="stat-val">4 days</div>
    </div>
    <div class="stat-row">
      <div class="stat-icon" style="background:rgba(255,214,10,0.15)">⭐</div>
      <div class="stat-label">Longest streak</div>
      <div class="stat-val">7 days</div>
    </div>
    <div class="stat-row">
      <div class="stat-icon" style="background:rgba(52,199,89,0.12)">✅</div>
      <div class="stat-label">Total check-ins</div>
      <div class="stat-val">12</div>
    </div>
    <div class="stat-row">
      <div class="stat-icon" style="background:rgba(255,45,85,0.1)">❤️</div>
      <div class="stat-label">Gratitude entries</div>
      <div class="stat-val">8</div>
    </div>
  </div>

  <div class="section-label">Achievements</div>

  <div class="achievements">
    <div class="ach-tile">
      <div class="ach-icon-wrap" style="background:rgba(52,199,89,0.12)">✅</div>
      <div class="ach-label">First check-in</div>
    </div>
    <div class="ach-tile">
      <div class="ach-icon-wrap" style="background:rgba(255,159,10,0.12)">🔥</div>
      <div class="ach-label">3-day streak</div>
    </div>
    <div class="ach-tile">
      <div class="ach-icon-wrap" style="background:rgba(255,149,0,0.12)">✨</div>
      <div class="ach-label">7-day streak</div>
    </div>
    <div class="ach-tile locked">
      <div class="ach-icon-wrap">⭐</div>
      <div class="ach-label">10 check-ins</div>
    </div>
    <div class="ach-tile locked">
      <div class="ach-icon-wrap">🏆</div>
      <div class="ach-label">30-day streak</div>
    </div>
    <div class="ach-tile">
      <div class="ach-icon-wrap" style="background:rgba(255,45,85,0.1)">❤️</div>
      <div class="ach-label">First gratitude</div>
    </div>
  </div>

    <div style="height: 12px;"></div>
  </div><!-- end .screen-scroll -->

  <div class="tab-bar">
    <div class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">Home</span></div>
    <div class="tab-item"><span class="tab-icon">📊</span><span class="tab-label">Insights</span></div>
    <div class="tab-item"><span class="tab-icon">🧰</span><span class="tab-label">Toolkit</span></div>
    <div class="tab-item active"><span class="tab-icon">👤</span><span class="tab-label">Profile</span></div>
  </div>
</div>
</body></html>
