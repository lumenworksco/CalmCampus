name: calm_campus
description: "Privacy-first student wellness companion"
publish_to: 'none'
version: 0.2.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  fl_chart: ^0.70.2
  pedometer: ^4.0.2
  permission_handler: ^11.3.1
  intl: ^0.19.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.2.0
  flutter_local_notifications: ^18.0.0
  flutter_timezone: ^4.1.0
  timezone: ^0.10.0
  package_info_plus: ^10.1.0
  app_usage: ^4.1.0
  health: ^13.3.1
  flutter_activity_recognition: ^4.0.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Force newer device_info_plus to fix iOS build issue with Xcode 26.
# The transitive 12.4.0 (via `health`) calls `isiOSAppOnVision` without
# the proper @available guard.
dependency_overrides:
  device_info_plus: ^13.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  min_sdk_android: 26

flutter:
  uses-material-design: true
  assets:
    - assets/avatar.jpg
